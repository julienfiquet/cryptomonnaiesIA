<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto AI Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden;
        }
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .crypto-prices {
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 10px;
        }
        .ai-chat {
            margin-top: 20px;
        }
        input, button {
            padding: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: #008CBA;
            color: white;
            cursor: pointer;
        }
        .booking-section, .affiliation-section {
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .booking-section input, .booking-section button, .affiliation-section a {
            margin: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <video autoplay muted loop class="background-video">
        <source src="crypto_background.mp4" type="video/mp4">
    </video>
    
    <div class="container">
        <h1>Bienvenue sur Crypto AI Dashboard</h1>
        <div class="crypto-prices" id="crypto-prices">
            Chargement des prix des cryptos...
        </div>
        <div class="ai-chat">
            <input type="text" id="userInput" placeholder="Posez une question sur les cryptos...">
            <button onclick="askAI()">Envoyer</button>
        </div>
        
        <div class="booking-section">
            <h2>Réservez une consultation</h2>
            <input type="text" id="userName" placeholder="Votre nom">
            <input type="datetime-local" id="appointmentTime">
            <button onclick="bookAppointment()">Réserver</button>
            <p id="bookingMessage"></p>
            <button id="payButton">Payer par carte bancaire</button>
            <button id="cryptoPayButton">Payer avec Coinbase</button>
            <button id="binancePayButton">Payer avec Binance Pay</button>
        </div>

        <div class="affiliation-section">
            <h2>Profitez de nos offres partenaires</h2>
            <p>Rejoignez les meilleures plateformes de trading et bénéficiez d'avantages exclusifs :</p>
            <a href="https://www.binance.com/?ref=votre_code_affiliation" target="_blank">S'inscrire sur Binance</a><br>
            <a href="https://www.coinbase.com/join/votre_code_affiliation" target="_blank">S'inscrire sur Coinbase</a><br>
            <a href="https://ledger.com/?r=votre_code_affiliation" target="_blank">Acheter un Ledger Wallet</a>
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        async function fetchCryptoPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple&vs_currencies=usd');
                const data = await response.json();
                document.getElementById('crypto-prices').innerHTML = `
                    Bitcoin: $${data.bitcoin.usd}<br>
                    Ethereum: $${data.ethereum.usd}<br>
                    Ripple: $${data.ripple.usd}
                `;
            } catch (error) {
                console.error('Erreur lors du chargement des prix des cryptos', error);
            }
        }
        fetchCryptoPrices();
        setInterval(fetchCryptoPrices, 60000);

        function bookAppointment() {
            const name = document.getElementById('userName').value;
            const time = document.getElementById('appointmentTime').value;
            if (name && time) {
                document.getElementById('bookingMessage').innerText = `Rendez-vous confirmé pour ${name} le ${new Date(time).toLocaleString()}`;
            } else {
                document.getElementById('bookingMessage').innerText = 'Veuillez remplir tous les champs';
            }
        }
    </script>
</body>
</html>
