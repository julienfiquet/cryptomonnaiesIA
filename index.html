<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto AI Dashboard</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .section {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            margin: 10px 0;
            width: 90%;
            max-width: 600px;
        }
        button {
            padding: 10px;
            border-radius: 5px;
            border: none;
            background-color: #008CBA;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        input {
            padding: 10px;
            width: 100%;
            margin: 10px 0;
        }
        .adsense-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Crypto AI Dashboard</h1>
        
        <div class="section" id="crypto-prices">Chargement des prix des cryptos...</div>
        <p id="crypto-error" style="color: red; display: none;">Erreur lors du chargement des prix des cryptos.</p>
        
        <div class="section" id="market-analysis">Chargement de l'analyse du marché...</div>
        
        <div class="adsense-container">
            <ins class="adsbygoogle"
                style="display:block"
                data-ad-client="5890689685"
                data-ad-slot="YYYYYYYYYY"
                data-ad-format="auto"
                data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
        
        <div class="section">
            <h2>Réservez une consultation</h2>
            <input type="text" id="userName" placeholder="Votre nom">
            <input type="datetime-local" id="appointmentTime">
            <button onclick="bookAppointment()">Réserver</button>
            <p id="bookingMessage"></p>
            <button onclick="payWithCard()">Payer par carte</button>
            <button onclick="payWithCrypto()">Payer en crypto</button>
            <button onclick="payWithBinance()">Payer avec Binance Pay</button>
        </div>
        
        <div class="section">
            <h2>Offres partenaires</h2>
            <a href="https://www.binance.com/?ref=votre_code_affiliation" target="_blank">S'inscrire sur Binance</a><br>
            <a href="https://www.coinbase.com/join/votre_code_affiliation" target="_blank">S'inscrire sur Coinbase</a><br>
            <a href="https://ledger.com/?r=votre_code_affiliation" target="_blank">Acheter un Ledger Wallet</a>
        </div>
    </div>

    <script>
        async function fetchCryptoPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple&vs_currencies=usd');
                if (!response.ok) throw new Error('Problème réseau');
                const data = await response.json();
                document.getElementById('crypto-prices').innerHTML = `
                    Bitcoin: $${data.bitcoin.usd}<br>
                    Ethereum: $${data.ethereum.usd}<br>
                    Ripple: $${data.ripple.usd}
                `;
                document.getElementById('crypto-error').style.display = 'none';
            } catch (error) {
                console.error('Erreur lors du chargement des prix des cryptos', error);
                document.getElementById('crypto-error').style.display = 'block';
            }
        }
        fetchCryptoPrices();
        setInterval(fetchCryptoPrices, 60000);

        async function fetchMarketAnalysis() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/global');
                if (!response.ok) throw new Error('Problème réseau');
                const data = await response.json();
                document.getElementById('market-analysis').innerHTML = `
                    Market Cap Global: $${(data.data.total_market_cap.usd / 1e12).toFixed(2)}T<br>
                    Volume Global: $${(data.data.total_volume.usd / 1e9).toFixed(2)}B<br>
                    Bitcoin Dominance: ${data.data.market_cap_percentage.btc.toFixed(2)}%
                `;
            } catch (error) {
                console.error('Erreur lors du chargement de l'analyse du marché', error);
            }
        }
        fetchMarketAnalysis();
        setInterval(fetchMarketAnalysis, 60000);

        function bookAppointment() {
            const name = document.getElementById('userName').value;
            const time = document.getElementById('appointmentTime').value;
            if (name && time) {
                document.getElementById('bookingMessage').innerText = `Rendez-vous confirmé pour ${name} le ${new Date(time).toLocaleString()}`;
            } else {
                document.getElementById('bookingMessage').innerText = 'Veuillez remplir tous les champs';
            }
        }

        function payWithCard() {
            window.location.href = "https://checkout.stripe.com/pay/votre_checkout_id";
        }
        function payWithCrypto() {
            window.location.href = "https://commerce.coinbase.com/checkout/votre_checkout_id";
        }
        function payWithBinance() {
            window.location.href = "https://pay.binance.com/checkout/votre_checkout_id";
        }
    </script>
</body>
</html>
