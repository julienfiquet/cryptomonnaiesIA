<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto AI Dashboard</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: transparent;
            color: #ffffff;
            text-align: center;
            overflow-x: hidden;
        }
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        .container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            text-shadow: 0px 0px 15px white;
        }
        .section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0px 0px 15px white;
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
            width: 90%;
            max-width: 600px;
        }
        button {
            padding: 12px;
            border-radius: 5px;
            border: none;
            background: linear-gradient(90deg, #ffffff, #cccccc);
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0px 0px 10px white;
        }
        input {
            padding: 12px;
            width: 100%;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-align: center;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <video autoplay muted loop class="background-video">
        <source src="video.mp4" type="video/mp4">
    </video>
    <div class="container">
        <h1 class="glow">Crypto AI Dashboard</h1>
        
        <div class="section" id="crypto-prices">Chargement des prix des cryptos...</div>
        <p id="crypto-error" style="color: red; display: none;">Erreur lors du chargement des prix des cryptos.</p>
        
        <div class="section">
            <h2>Prendre un rendez-vous</h2>
            <input type="text" id="userName" placeholder="Votre nom">
            <input type="datetime-local" id="appointmentTime">
            <button onclick="bookAppointment()">Réserver</button>
            <p id="bookingMessage"></p>
        </div>
        
        <div class="section">
            <h2>Monétisation</h2>
            <ins class="adsbygoogle"
                style="display:block"
                data-ad-client="5890689685"
                data-ad-slot="YYYYYYYYYY"
                data-ad-format="auto"
                data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="section">
            <h2>Paiement avec Binance</h2>
            <button onclick="payWithBinance()">Payer avec Binance Pay</button>
        </div>
    </div>

    <script>
        async function fetchCryptoPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple&vs_currencies=usd');
                if (!response.ok) throw new Error('Problème réseau');
                const data = await response.json();
                document.getElementById('crypto-prices').innerHTML = `
                    Bitcoin: $${data.bitcoin.usd}<br>
                    Ethereum: $${data.ethereum.usd}<br>
                    Ripple: $${data.ripple.usd}
                `;
                document.getElementById('crypto-error').style.display = 'none';
            } catch (error) {
                console.error('Erreur lors du chargement des prix des cryptos', error);
                document.getElementById('crypto-error').style.display = 'block';
            }
        }
        fetchCryptoPrices();
        setInterval(fetchCryptoPrices, 60000);

        function bookAppointment() {
            const name = document.getElementById('userName').value;
            const time = document.getElementById('appointmentTime').value;
            if (name && time) {
                document.getElementById('bookingMessage').innerText = `Rendez-vous confirmé pour ${name} le ${new Date(time).toLocaleString()}`;
            } else {
                document.getElementById('bookingMessage').innerText = 'Veuillez remplir tous les champs';
            }
        }

        function payWithBinance() {
            window.location.href = "https://pay.binance.com/checkout/16Ya7voiiqm7LS7V2zDedfakvU5RZGN28D";
        }
    </script>
</body>
</html>
