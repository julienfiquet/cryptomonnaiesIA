<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Tracker & IA</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    #background-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(60%) contrast(130%) saturate(160%) blur(0.5px);
      z-index: -1;
    }
    .content {
      position: relative;
      z-index: 1;
      padding: 20px;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 10px;
      width: 80%;
      max-width: 600px;
      box-shadow: 0px 0px 20px rgba(0, 153, 255, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1, p {
      text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
    }
    #crypto-list {
      list-style: none;
      padding: 0;
      margin-top: 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #crypto-list li {
      background: rgba(255, 255, 255, 0.2);
      padding: 15px;
      margin: 10px auto;
      border-radius: 5px;
      width: 80%;
      font-size: 18px;
      font-weight: bold;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      box-shadow: 0px 0px 10px rgba(0, 153, 255, 0.8);
      text-align: center;
    }
  </style>
</head>
<body>
  <video autoplay loop muted playsinline id="video">
    <source src="assets/video.mp4" type="video/mp4">
    Votre navigateur ne supporte pas la vidéo.
  </video>

  <div class="content">
    <h1>Crypto Tracker</h1>
    <p>Débloquez les secrets pour des profits explosifs</p>
    <ul id="crypto-list">
      <li>Chargement des données...</li>
    </ul>
  </div>

  <script>
    async function fetchTopGainers() {
      try {
        const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1&sparkline=false');
        const data = await response.json();
        
        const sortedData = data.sort((a, b) => b.price_change_percentage_24h - a.price_change_percentage_24h);
        const topGainers = sortedData.slice(0, 5);
        
        const cryptoList = document.getElementById('crypto-list');
        cryptoList.innerHTML = '';
        
        topGainers.forEach(coin => {
          const coinItem = document.createElement('li');
          coinItem.innerHTML = `<strong>${coin.name} (${coin.symbol.toUpperCase()})</strong> - ${coin.current_price} USD (⬆ ${coin.price_change_percentage_24h.toFixed(2)}%)`;
          cryptoList.appendChild(coinItem);
        });
      } catch (error) {
        console.error('Erreur lors de la récupération des données :', error);
        document.getElementById('crypto-list').innerHTML = '<li>Impossible de charger les données.</li>';
      }
    }
    fetchTopGainers();
    setInterval(fetchTopGainers, 60000); // Mise à jour toutes les minutes
  </script>
</body>
</html>
