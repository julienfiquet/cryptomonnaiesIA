<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site avec Vidéo en Fond</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            overflow: hidden;
            color: white;
            text-align: center;
        }
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        .content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
        }
        h1 {
            font-size: 3rem;
        }
        p {
            font-size: 1.5rem;
            max-width: 800px;
        }
    </style>
</head>
<body>
    <video autoplay muted loop class="video">
        <source src="video.mp4" type="video/mp4">
        Votre navigateur ne supporte pas les vidéos HTML5.
    </video>
    <div class="content">
        <h1>Bienvenue sur mon site</h1>
        <p>Un design immersif avec une vidéo en arrière-plan pour une expérience unique.</p>
    </div>
</body>
</html>
